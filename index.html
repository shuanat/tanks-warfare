<!DOCTYPE html>
<!-- Легаси: монолитный клиент. Актуальная сборка: client/ → npm run build → client/dist -->
<html>

<head>
    <meta charset="UTF-8">
    <title>Tanks: Warfare 3v3</title>
    <style>

            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #4CAF50;
            padding: 30px;
            text-align: center;
            z-index: 100;
            border-radius: 10px;
            width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #lobby {

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #2196F3;
            padding: 20px;
            text-align: center;
            z-index: 100;
            border-radius: 10px;
            width: 520px;
            max-height: 90vh;
            overflow-y: auto;
            display: none;
        }

        input,
        button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            border-radius: 4px;
        }

        input {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            text-align: center;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }

        button.ready-btn {
            background: #2196F3;
        }

        button.ready-btn.ready {
            background: #f44336;
        }

        h2 {
            color: #4CAF50;
            margin-top: 0;
        }

        .status {
            color: #aaa;
            font-size: 14px;
            margin-top: 10px;
        }

        .lobby-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #222;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }

        .lobby-name {
            font-weight: bold;
        }

        .lobby-players {
            color: #aaa;
            font-size: 14px;
        }

        .join-btn {
            background: #2196F3;
            padding: 5px 15px;
        }

        .color-picker {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin: 10px 0;
        }

        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.selected {
            border: 3px solid #ffeb3b;
            transform: scale(1.15);
        }

        .player-slot {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #222;
            padding: 8px;
            margin: 5px 0;
            border-radius: 4px;
            font-size: 14px;
        }

        .player-slot.team1 {
            border-left: 4px solid #4CAF50;
        }

        .player-slot.team2 {
            border-left: 4px solid #f44336;
        }

        .player-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #fff;
            flex-shrink: 0;
        }

        .lobby-teams {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
        }

        .lobby-controls {
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 15px;
        }

        .team-btn {
            width: 100px;
            margin: 3px;
        }

        .team-btn.t1 {
            background: #4CAF50;
        }

        .team-btn.t2 {
            background: #f44336;
        }

        #ui-game {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        #volume-control {
            position: fixed;
            top: 10px;
            right: 10px;
            display: none;
            z-index: 15;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 10px;
            border-radius: 4px;
        }

        #volume-control input {
            width: 100px;
            vertical-align: middle;
            cursor: pointer;
        }

        #score-board {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 32px;
            font-weight: bold;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        #boost-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            display: none;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .boost-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }

        .boost-icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: none;
        }

        .boost-icon.circle {
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .overlay-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            text-shadow: 2px 2px 10px #000;
            display: none;
            z-index: 20;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>

        <div style="margin:15px 0;">

        <div class="lobby-teams">

        </div>
        <div id="lobby-status" class="status"></div>
    </div>
    <div id="volume-control">🔊 <input type="range" min="0" max="100" value="100" id="volumeSlider"></div>
    <div id="ui-game">

            <span style="color:#888; background:#444; padding:0 2px; border-radius:2px;">Q</span> Дым | <span
                style="color:#f44336; font-weight:bold;">E</span> Мина | <span style="color:#ffeb3b">Space</span> Ракета
        </div>

        let width, height, mapWidth = MAP_WIDTH, mapHeight = MAP_HEIGHT;

        assets.images.tankTurret.src = '/assets/images/tank_turret_green.png';
        assets.sounds.shoot.src = '/assets/sounds/shoot.mp3';
        assets.sounds.hit.src = '/assets/sounds/hit.mp3';
        assets.sounds.explosion.src = '/assets/sounds/explosion.mp3';
        assets.sounds.brickHit.src = '/assets/sounds/brick_hit.mp3';

        let assetsLoadedCount = 0;
        const totalAssets = 9;

        function checkAssetsLoaded() {
            assetsLoadedCount++;
            if (assetsLoadedCount >= totalAssets) {
                assets.loaded = true;
                console.log('✅ Все ассеты загружены');
            }
        }

        Object.values(assets.images).forEach(img => {
            img.onload = checkAssetsLoaded;
            img.onerror = () => { console.warn('Не загрузилось изображение:', img.src); checkAssetsLoaded(); };
        });

        Object.values(assets.sounds).forEach(audio => {
            audio.addEventListener('canplaythrough', checkAssetsLoaded);
            audio.addEventListener('error', () => { console.warn('Не загрузился звук:', audio.src); checkAssetsLoaded(); });
            audio.preload = 'auto';
            audio.load();
        });

        function getNickname() {
            const inputNick = document.getElementById('nicknameInput').value.trim();
            if (inputNick) { sessionStorage.setItem('tank_nickname_session', inputNick); return sanitize(inputNick, 12); }

            if (!nick) { nick = 'Игрок' + Math.floor(Math.random() * 1000); sessionStorage.setItem('tank_nickname_session', nick); }

        function sanitize(str, maxLen) {
            return str.substring(0, maxLen).replace(/[^a-zA-Z0-9_а-яА-Я]/g, '') || 'Игрок';
        }
        window.addEventListener('load', () => {
            const nickInput = document.getElementById('nicknameInput');

            connect();

        function initColorPicker() {
            const picker = document.getElementById('colorPicker');
            picker.innerHTML = '';
            TANK_COLORS.forEach(color => {
                const btn = document.createElement('div');
                btn.className = 'color-btn' + (color === myColor ? ' selected' : '');
                btn.style.background = color;
                btn.onclick = () => selectColor(color);
                picker.appendChild(btn);
            });
        }
        function selectColor(color) {
            myColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));

                ws.send(JSON.stringify({ type: 'update_player', color: color }));

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        }
        function updateVolume() {

            masterGain.gain.setValueAtTime(document.getElementById('volumeSlider').value / 100, audioCtx.currentTime);
        }
        document.getElementById('volumeSlider').addEventListener('input', updateVolume);

        function playSound_Shot(vol = 1) {
            const s = assets.sounds.shoot.cloneNode();
            s.volume = vol;
            s.load();
            s.play().catch(() => { });
        }
        function playSound_Hit() {
            const s = assets.sounds.hit.cloneNode();
            s.load();
            s.play().catch(() => { });
        }
        function playSound_Explosion() {
            const s = assets.sounds.explosion.cloneNode();
            s.load();
            s.play().catch(() => { });
        }
        function playSound_BrickHit(vol = 1) {
            const s = assets.sounds.brickHit.cloneNode();
            s.volume = vol;
            s.load();
            s.play().catch(() => { });
        }
        function playSound_Heal() { for (let i = 0; i < 3; i++)setTimeout(() => tone(500 + i * 150, 0.06, 'sine', 0.1), i * 40); }
        function playSound_Speed() { for (let i = 0; i < 5; i++)setTimeout(() => tone(300 + i * 100, 0.04, 'square', 0.08), i * 20); }
        function playSound_Damage() { tone(300, 0.05, 'triangle', 0.15); setTimeout(() => tone(150, 0.1, 'sawtooth', 0.2), 50); }
        function playSound_Smoke() { noise(0.5, 100, 1, 0.2, 'lowpass', 0.2); tone(100, 0.3, 'sine', 0.1); }
        function playBombBeep() { for (let i = 0; i < 5; i++)tone(1500, 0.05, 'square', 0.15, null, i * 0.1); }
        function playAlert() { tone(880, 0.2, 'sawtooth', 0.15); tone(880, 0.2, 'sawtooth', 0.1, null, 0.25); }
        function playRocketFlyBy() { if (!audioCtx) return; const len = audioCtx.sampleRate * 2, buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate), data = buf.getChannelData(0); for (let i = 0; i < len; i++)data[i] = Math.random() * 2 - 1; const src = audioCtx.createBufferSource(); src.buffer = buf; const flt = audioCtx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 1200; flt.Q.value = 2; const g = audioCtx.createGain(); g.gain.setValueAtTime(0.001, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 1); g.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 2); src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(); src.stop(audioCtx.currentTime + 2); }
        function playSound_Victory() { const m = [{ f: 523, t: 0 }, { f: 523, t: 100 }, { f: 659, t: 200 }, { f: 784, t: 350 }, { f: 659, t: 500 }, { f: 784, t: 650 }, { f: 1047, t: 800 }]; m.forEach(n => setTimeout(() => { tone(n.f, 0.4, 'square', 0.1); tone(n.f * 0.5, 0.4, 'triangle', 0.08); }, n.t)); }
        function playSound_StartMusic() { const n = [{ f: 262, d: 0.12 }, { f: 330, d: 0.12 }, { f: 392, d: 0.12 }, { f: 523, d: 0.25 }, { f: 392, d: 0.12 }, { f: 523, d: 0.35 }]; let t = 0; n.forEach(x => { setTimeout(() => { tone(x.f, x.d, 'square', 0.12); tone(x.f * 0.5, x.d, 'triangle', 0.08); }, t); t += x.d * 1000; }); }

        function noise(d, f, q, v, t, dec) { if (!audioCtx) return; const len = audioCtx.sampleRate * d, buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate), data = buf.getChannelData(0); for (let i = 0; i < len; i++)data[i] = Math.random() * 2 - 1; const src = audioCtx.createBufferSource(); src.buffer = buf; const flt = audioCtx.createBiquadFilter(); flt.type = t; flt.frequency.value = f; flt.Q.value = q; const g = audioCtx.createGain(); g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.setTargetAtTime(0.001, audioCtx.currentTime, dec); src.connect(flt); flt.connect(g); g.connect(masterGain); src.start(); src.stop(audioCtx.currentTime + d); }
        function tone(f, d, t, v, s = null, delay = 0) { if (!audioCtx) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime + delay); if (s) o.frequency.setTargetAtTime(s, audioCtx.currentTime + delay, d * 0.4); g.gain.setValueAtTime(v, audioCtx.currentTime + delay); g.gain.setTargetAtTime(0.001, audioCtx.currentTime + delay, d * 0.5); o.connect(g); g.connect(masterGain); o.start(audioCtx.currentTime + delay); o.stop(audioCtx.currentTime + delay + d); }

        class TankEngine {
