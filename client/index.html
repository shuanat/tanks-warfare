<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tanks: Warfare 3v3</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body>
  <div id="menu">
    <h2>TANKS: WARFARE</h2>
    <input type="text" id="nicknameInput" placeholder="Твой никнейм" maxlength="12" />
    <br />
    <input type="text" id="lobbyNameInput" placeholder="Название лобби (макс. 30)" maxlength="30"
      style="width: 250px" />
    <button id="btnCreate" type="button">➕ СОЗДАТЬ ЛОББИ</button>
    <br /><br />
    <div style="text-align: left; font-size: 14px; color: #aaa; margin: 10px 0">📋 Доступные лобби:</div>
    <div id="lobbyList" style="max-height: 200px; overflow-y: auto; text-align: left"></div>
    <br />
    <input type="text" id="roomIdInput" placeholder="Или код лобби" style="width: 150px" />
    <button id="btnJoin" type="button">🔗 ВОЙТИ ПО КОДУ</button>
    <div id="status" class="status"></div>
  </div>
  <div id="lobby">
    <h2>ЛОББИ: <span id="lobbyNameDisplay"></span></h2>
    <div style="color: #ffeb3b; font-size: 18px; margin: 5px 0">Код: <span id="roomCodeDisplay"></span></div>
    <div style="margin: 15px 0">
      <div style="font-size: 14px; color: #aaa; margin-bottom: 5px">Твой никнейм:</div>
      <input type="text" id="lobbyNickInput" maxlength="12" style="width: 150px" />
    </div>
    <div style="margin: 15px 0">
      <div style="font-size: 14px; color: #aaa; margin-bottom: 5px">Цвет танка:</div>
      <div class="color-picker" id="colorPicker"></div>
    </div>
    <div class="lobby-teams">
      <div style="flex: 1">
        <h3 style="color: #4caf50; margin: 5px 0">🟢 Команда 1</h3>
        <div id="team1-list"></div>
      </div>
      <div style="flex: 1">
        <h3 style="color: #f44336; margin: 5px 0">🔴 Команда 2</h3>
        <div id="team2-list"></div>
      </div>
    </div>
    <div class="lobby-controls">
      <button class="team-btn t1" type="button">В команду 1</button>
      <button class="team-btn t2" type="button">В команду 2</button>
      <br />
      <button id="btnReady" class="ready-btn" type="button">Готов</button>
      <button id="btnStart" type="button" style="display: none; background: #ffeb3b; color: #000; margin-left: 10px">
        🎮 НАЧАТЬ БОЙ
      </button>
      <button id="btnAddBot" type="button" style="display: none; margin-left: 10px">🤖 ДОБАВИТЬ БОТА</button>
      <button id="btnRemoveBot" type="button" style="display: none; margin-left: 10px">🗑 УБРАТЬ БОТА</button>
    </div>
    <div id="lobby-status" class="status"></div>
  </div>
  <div id="volume-control">🔊 <input type="range" min="0" max="100" value="100" id="volumeSlider" /></div>
  <div id="ui-game">
    <span style="color: #4caf50">WASD</span> Движение | <span style="color: #ffeb3b">Мышь</span> Огонь
    <div style="margin-top: 5px; font-size: 12px">
      <span style="color: #888; background: #444; padding: 0 2px; border-radius: 2px">Q</span> Дым |
      <span style="color: #f44336; font-weight: bold">E</span> Мина |
      <span style="color: #ffeb3b">Space</span> Ракета
    </div>
    <div id="fps-hud" class="fps-hud" aria-live="polite"><span id="fps-value">—</span> FPS</div>
  </div>
  <div id="score-board">
    <span id="score-me" style="color: #4caf50">0</span> - <span id="score-enemy" style="color: #f44336">0</span>
  </div>
  <div id="boost-panel"></div>
  <div id="victory-screen" class="overlay-msg">ПОБЕДА!</div>
  <div id="death-screen" class="overlay-msg" style="color: #f44336">УНИЧТОЖЕН</div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
